name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: noted-linux-amd64.tar.gz
            binary: noted
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: noted-macos-arm64.tar.gz
            binary: noted
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: noted-macos-amd64.tar.gz
            binary: noted
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: noted-windows-amd64.tar.gz
            binary: noted.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.binary }}
          tar czf ${{ matrix.asset }} -C dist .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
